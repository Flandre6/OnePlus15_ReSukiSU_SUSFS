name: Test Telegram Notification

on:
  workflow_dispatch:

jobs:
  test-notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: 📱 Test Telegram Notification (Latest Release)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail
          echo "::group::Fetch Latest Release & Send Telegram Notification"
          
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "::error::Telegram secrets not configured! Please check TG_BOT_TOKEN and TG_CHAT_ID."
            exit 1
          fi
          
          echo "Fetching latest release from GitHub API..."
          
          LATEST_TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null || true)
          
          if [ -z "$LATEST_TAG" ]; then
            echo "::error::No releases found in the repository! Please run a real build and release first."
            exit 1
          fi
          
          echo "✅ Found latest Release Tag: $LATEST_TAG"
          
          MSG_TEXT="🧪 <b>[TEST] OnePlus Kernel Release!</b>\n"
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━\n"
          MSG_TEXT+="<b>🏷️ Release Tag:</b> <code>${LATEST_TAG}</code>\n"
          MSG_TEXT+="<b>🔐 Root Solution:</b> Auto-detected\n"
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━\n"
          MSG_TEXT+="<b>📦 Device Builds & Downloads:</b>\n\n"
          
          ASSETS=$(gh api repos/${{ github.repository }}/releases/latest --jq '.assets[].name' 2>/dev/null || true)
          
          if [ -z "$ASSETS" ]; then
            MSG_TEXT+="<i>⚠️ No assets found in this release.</i>\n\n"
          else
            MODELS=$(echo "$ASSETS" | grep '\.zip$' | awk -F'_' '{print $2}' | sort -u | paste -sd ", " - || echo "Various")
            OS_VERS=$(echo "$ASSETS" | grep '\.zip$' | awk -F'_' '{print $3}' | sort -u | paste -sd ", " - || echo "Various")
            ZIP_COUNT=$(echo "$ASSETS" | grep -c '\.zip$' || true)
            
            MSG_TEXT+="<b>📦 Total Packages:</b> ${ZIP_COUNT} zips\n"
            MSG_TEXT+="<b>📱 Supported Models:</b> ${MODELS}\n"
            MSG_TEXT+="<b>💻 Supported OS:</b> ${OS_VERS}\n\n"
          fi
          
          MSG_TEXT+="━━━━━━━━━━━━━━━━━━\n"
          MSG_TEXT+="👉 <a href=\"https://github.com/${{ github.repository }}/releases/tag/${LATEST_TAG}\"><b>📥 DOWNLOAD YOUR KERNEL HERE</b></a>"
          
          echo "Constructing secure JSON payload..."
          
          PAYLOAD=$(jq -n \
            --arg chat_id "$TG_CHAT_ID" \
            --arg text "$MSG_TEXT" \
            '{
              chat_id: $chat_id,
              parse_mode: "HTML",
              disable_web_page_preview: true,
              text: $text
            }')
          
          echo "Sending message to Telegram API..."
          
          HTTP_RESPONSE=$(curl -s -w "%{http_code}" -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
            
          if [[ "$HTTP_RESPONSE" != *200 ]]; then
            echo "::error::Telegram push failed! Server response: $HTTP_RESPONSE"
            echo "::error::Please check if Chat ID is correct and if the bot has been added to the channel as an admin!"
            exit 1
          fi
          
          echo "✅ Channel push test successful!"
          echo "::endgroup::"